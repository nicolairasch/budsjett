<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budsjett</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f1a; font-family: 'DM Sans', sans-serif; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    input[type=file] { display: none; }
    ::-webkit-scrollbar { width: 0; }

      .no-print { display: none !important; }
      .print-area { background: white; color: black; padding: 32px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://vaivnbwpatdxvgirhrht.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MYU_ipmt9d88qx6GnvjHCA_ysGl2aiF";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATEGORIES = [
      { id: "mat", label: "Mat & Drikke", icon: "🛒", color: "#E8A87C" },
      { id: "transport", label: "Transport", icon: "🚌", color: "#85C1E9" },
      { id: "fritid", label: "Fritid", icon: "🎮", color: "#A29BFE" },
      { id: "annet", label: "Annet", icon: "📦", color: "#81ECEC" },
    ];

    const MONTHS = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];
    const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
    const formatNOK = (n) => new Intl.NumberFormat("nb-NO", { style: "currency", currency: "NOK", maximumFractionDigits: 0 }).format(n);
    const today = () => new Date().toISOString().split("T")[0];

    // ─── MONTHLY REPORT ──────────────────────────────────────────────────────
    function MonthlyReport({ transactions, budgets, onClose }) {
      const [reportMonth, setReportMonth] = useState(new Date().getMonth());
      const [reportYear, setReportYear] = useState(new Date().getFullYear());

      const monthTxs = transactions.filter(t => {
        const d = new Date(t.date);
        return d.getMonth() === reportMonth && d.getFullYear() === reportYear;
      });

      const spentByCategory = CATEGORIES.reduce((acc, c) => {
        acc[c.id] = monthTxs.filter(t => t.category === c.id).reduce((sum, t) => sum + Number(t.amount), 0);
        return acc;
      }, {});

      const totalSpent = Object.values(spentByCategory).reduce((a, b) => a + b, 0);
      const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
      const saved = totalBudget - totalSpent;

      const printReport = () => {
        const printContent = document.getElementById("report-content").innerHTML;
        const win = window.open("", "_blank");
        win.document.write(`
          <html><head><title>Månadsrapport ${MONTHS[reportMonth]} ${reportYear}</title>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
          <style>
            body { font-family: 'DM Sans', sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
            h1 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 8px; }
            .subtitle { color: #666; margin-bottom: 32px; }
            .card { border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
            .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
            .cat-row:last-child { border-bottom: none; }
            .cat-name { display: flex; align-items: center; gap: 8px; }
            .progress { height: 6px; background: #f0f0f0; border-radius: 3px; margin-top: 6px; }
            .progress-fill { height: 100%; border-radius: 3px; }
            .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 600; padding-top: 16px; border-top: 2px solid #333; margin-top: 8px; }
            .saved { color: ${saved >= 0 ? '#2ecc71' : '#e74c3c'}; }
            .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
            .summary-card { border: 1px solid #eee; border-radius: 12px; padding: 16px; text-align: center; }
            .summary-amount { font-size: 24px; font-family: 'DM Serif Display', serif; }
            .summary-label { font-size: 12px; color: #666; margin-top: 4px; }
          </style></head><body>${printContent}</body></html>
        `);
        win.document.close();
        win.print();
      };

      return (
        <div style={s.overlay}>
          <div style={{...s.modal, maxHeight:"85vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
              <div style={s.modalTitle}>📊 Månadsrapport</div>
              <button onClick={onClose} style={{...s.logoutBtn}}>✕</button>
            </div>

            {/* Month/Year selector */}
            <div style={{display:"flex",gap:"10px",marginBottom:"24px",alignItems:"center"}}>
              <select value={reportMonth} onChange={e => setReportMonth(Number(e.target.value))}
                style={{...s.input, flex:1}}>
                {MONTHS.map((m, i) => <option key={i} value={i} style={{background:"#1a1a2e"}}>{m}</option>)}
              </select>
              <select value={reportYear} onChange={e => setReportYear(Number(e.target.value))}
                style={{...s.input, flex:"0 0 100px"}}>
                {[2024,2025,2026,2027].map(y => <option key={y} value={y} style={{background:"#1a1a2e"}}>{y}</option>)}
              </select>
            </div>

            <div id="report-content">
              <h1 style={{fontFamily:"'DM Serif Display',serif",color:"white",fontSize:"26px",marginBottom:"4px"}}>
                {MONTHS[reportMonth]} {reportYear}
              </h1>
              <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginBottom:"24px"}}>Månadsrapport</div>

              {/* Summary cards */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"24px"}}>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:"#FF6B6B"}}>{formatNOK(totalSpent)}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Brukt</div>
                </div>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:"rgba(255,255,255,0.7)"}}>{formatNOK(totalBudget)}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Budsjett</div>
                </div>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:saved>=0?"#A8E6CF":"#FF6B6B"}}>{formatNOK(Math.abs(saved))}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>{saved>=0?"Spart":"Overforbruk"}</div>
                </div>
              </div>

              {/* Category breakdown */}
              <div style={{...s.catCard,marginBottom:"16px"}}>
                {CATEGORIES.map((cat, i) => {
                  const spent = spentByCategory[cat.id];
                  const budget = budgets[cat.id];
                  const pct = budget > 0 ? Math.min((spent/budget)*100, 100) : 0;
                  const over = spent > budget;
                  return (
                    <div key={cat.id} style={{paddingBottom: i<CATEGORIES.length-1?"16px":"0", marginBottom: i<CATEGORIES.length-1?"16px":"0", borderBottom: i<CATEGORIES.length-1?"1px solid rgba(255,255,255,0.06)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <span style={{fontSize:"16px"}}>{cat.icon}</span>
                          <span style={{fontSize:"14px",color:"rgba(255,255,255,0.8)"}}>{cat.label}</span>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <span style={{fontSize:"15px",fontWeight:"600",color:over?"#FF6B6B":"white"}}>{formatNOK(spent)}</span>
                          <span style={{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginLeft:"4px"}}>/ {formatNOK(budget)}</span>
                        </div>
                      </div>
                      <div style={s.progressBg}>
                        <div style={{...s.progressFill, width:`${pct}%`, background:over?"#FF6B6B":cat.color}}/>
                      </div>
                      {over && <div style={{fontSize:"12px",color:"#FF6B6B",marginTop:"4px"}}>Overforbruk: {formatNOK(spent-budget)}</div>}
                    </div>
                  );
                })}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:"16px",borderTop:"1px solid rgba(255,255,255,0.1)",marginTop:"8px"}}>
                  <span style={{fontSize:"14px",color:"rgba(255,255,255,0.6)",fontWeight:"600"}}>Totalt</span>
                  <span style={{fontSize:"15px",fontWeight:"600",color:totalSpent>totalBudget?"#FF6B6B":"white"}}>{formatNOK(totalSpent)}</span>
                </div>
              </div>

              {monthTxs.length === 0 && <div style={s.empty}>Ingen transaksjoner denne måneden</div>}
            </div>

            <button onClick={printReport} style={{...s.btnPri,width:"100%",marginTop:"8px"}}>
              🖨️ Last ned / Skriv ut PDF
            </button>
          </div>
        </div>
      );
    }

    // ─── LOGIN ───────────────────────────────────────────────────────────────
    function Login() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [mode, setMode] = useState("login");

      const submit = async () => {
        if (!email || !password) return;
        setLoading(true);
        setError("");
        const result = mode === "login"
          ? await supabase.auth.signInWithPassword({ email, password })
          : await supabase.auth.signUp({ email, password });
        setLoading(false);
        if (result.error) setError(result.error.message);
      };

      return (
        <div style={s.loginRoot}>
          <div style={s.loginCard}>
            <div style={s.headerLabel}>FORBRUK</div>
            <h1 style={s.loginTitle}>Budsjett</h1>
            <div style={s.fg}>
              <div style={s.flabel}>E-postadresse</div>
              <input style={s.input} type="email" placeholder="din@epost.no"
                value={email} onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key==="Enter" && submit()} />
            </div>
            <div style={s.fg}>
              <div style={s.flabel}>Passord</div>
              <input style={s.input} type="password" placeholder="••••••••"
                value={password} onChange={e => setPassword(e.target.value)}
                onKeyDown={e => e.key==="Enter" && submit()} />
            </div>
            {error && <div style={{color:"#FF6B6B",fontSize:"13px",marginBottom:"12px"}}>{error}</div>}
            <button onClick={submit} disabled={loading} style={{...s.btnPri,width:"100%"}}>
              {loading ? "Venter..." : mode==="login" ? "Logg inn" : "Opprett konto"}
            </button>
            <button onClick={() => { setMode(mode==="login"?"register":"login"); setError(""); }}
              style={{...s.btnSec,width:"100%",marginTop:"10px"}}>
              {mode==="login" ? "Ny bruker? Opprett konto" : "Har du konto? Logg inn"}
            </button>
          </div>
        </div>
      );
    }

    // ─── RECEIPT SCANNER ─────────────────────────────────────────────────────
    function ReceiptScanner({ onResult, onClose }) {
      const [scanning, setScanning] = useState(false);
      const [preview, setPreview] = useState(null);
      const [error, setError] = useState("");
      const fileRef = useRef();

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result.split(",")[1];
          setPreview(ev.target.result);
          setScanning(true);
          setError("");
          try {
            const response = await fetch("/.netlify/functions/scan", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ image: base64, mimeType: file.type }),
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            const text = data.content[0].text.trim().replace(/```json|```/g, "").trim();
            const result = JSON.parse(text);
            onResult(result);
          } catch (err) {
            setError("Kunne ikke lese kvitteringen. Prøv et klarere bilde.");
          }
          setScanning(false);
        };
        reader.readAsDataURL(file);
      };

      return (
        <div style={s.overlay}>
          <div style={s.modal}>
            <div style={s.modalTitle}>📷 Scan kvittering</div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} />
            {!preview && !scanning && (
              <div>
                <p style={{fontSize:"14px",color:"rgba(255,255,255,0.5)",marginBottom:"20px",lineHeight:"1.6"}}>
                  Ta bilde av kvitteringen eller last opp fra kamerarulle.
                </p>
                <button onClick={() => fileRef.current.click()} style={{...s.btnPri,width:"100%",marginBottom:"12px"}}>
                  📷 Ta bilde / Last opp
                </button>
              </div>
            )}
            {preview && <img src={preview} style={{width:"100%",borderRadius:"12px",maxHeight:"200px",objectFit:"cover",marginBottom:"16px"}} />}
            {scanning && (
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:"32px",marginBottom:"12px"}}>🔍</div>
                <div style={{color:"rgba(255,255,255,0.6)"}}>Analyserer kvittering...</div>
              </div>
            )}
            {error && <div style={{color:"#FF6B6B",fontSize:"13px",marginBottom:"16px"}}>{error}</div>}
            <button onClick={onClose} style={{...s.btnSec,width:"100%",marginTop:"8px"}}>Avbryt</button>
          </div>
        </div>
      );
    }

    // ─── ADMIN ───────────────────────────────────────────────────────────────
    function AdminPanel({ user, onBack }) {
      const [usersData, setUsersData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [selected, setSelected] = useState(null);
      const [activeMonth, setActiveMonth] = useState(new Date().getMonth());
      const [newAdminEmail, setNewAdminEmail] = useState("");
      const [addingAdmin, setAddingAdmin] = useState(false);
      const [adminMsg, setAdminMsg] = useState("");

      useEffect(() => { fetchAllData(); }, []);

      const fetchAllData = async () => {
        setLoading(true);
        const { data, error } = await supabase.rpc("get_all_users_data");
        if (error) setError(error.message);
        else setUsersData(data || []);
        setLoading(false);
      };

      const addAdmin = async () => {
        if (!newAdminEmail) return;
        setAddingAdmin(true);
        setAdminMsg("");
        const found = usersData.find(u => u.email === newAdminEmail);
        if (!found) { setAdminMsg("❌ Finner ingen bruker med den e-posten."); setAddingAdmin(false); return; }
        const { error } = await supabase.from("admins").insert({ user_id: found.user_id });
        if (error) setAdminMsg("❌ " + (error.message.includes("duplicate") ? "Allerede admin." : error.message));
        else { setAdminMsg("✅ Admin lagt til!"); setNewAdminEmail(""); }
        setAddingAdmin(false);
      };

      if (loading) return <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.4)"}}>Laster...</div></div>;
      if (error) return <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}><div style={{color:"#FF6B6B",textAlign:"center"}}><div style={{fontSize:"18px",marginBottom:"8px"}}>Ingen tilgang</div><div style={{fontSize:"14px",color:"rgba(255,255,255,0.4)"}}>{error}</div></div></div>;

      if (selected) {
        const u = usersData.find(u => u.user_id === selected);
        const txs = (u.transactions||[]).filter(t => new Date(t.date).getMonth()===activeMonth);
        const budgets = u.budgets||{mat:0,transport:0,fritid:0,annet:0};
        const spent = CATEGORIES.reduce((acc,c) => { acc[c.id]=txs.filter(t=>t.category===c.id).reduce((s,t)=>s+Number(t.amount),0); return acc; },{});
        const totalSpent = Object.values(spent).reduce((a,b)=>a+b,0);
        const totalBudget = Object.values(budgets).reduce((a,b)=>a+b,0);
        return (
          <div style={s.root}><div style={s.orb1}/><div style={s.orb2}/>
            <div style={s.container}>
              <button onClick={()=>setSelected(null)} style={s.backBtn}>← Tilbake</button>
              <div style={s.headerLabel}>ADMIN · BRUKER</div>
              <h1 style={{...s.headerTitle,fontSize:"20px",marginBottom:"16px"}}>{u.email}</h1>
              <div style={s.monthPicker}>{MONTHS_SHORT.map((m,i)=><button key={i} onClick={()=>setActiveMonth(i)} style={{...s.monthBtn,...(activeMonth===i?s.monthBtnActive:{})}}>{m}</button>)}</div>
              <div style={s.card}>
                <div style={{flex:1}}><div style={s.summaryLabel}>Brukt denne måneden</div><div style={s.summaryAmount}>{formatNOK(totalSpent)}</div><div style={s.summaryOf}>av {formatNOK(totalBudget)} budsjett</div></div>
                <svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="8"/><circle cx="40" cy="40" r="34" fill="none" stroke={totalSpent>totalBudget?"#FF6B6B":"#A8E6CF"} strokeWidth="8" strokeDasharray={`${totalBudget>0?Math.min(totalSpent/totalBudget,1)*213.6:0} 213.6`} strokeLinecap="round" transform="rotate(-90 40 40)"/><text x="40" y="45" textAnchor="middle" fill="white" fontSize="12" fontWeight="700">{totalBudget>0?Math.round((totalSpent/totalBudget)*100):0}%</text></svg>
              </div>
              <div style={s.sectionTitle}>KATEGORIER</div>
              <div style={{...s.grid,marginBottom:"28px"}}>{CATEGORIES.map(cat=>{const sp=spent[cat.id];const bu=budgets[cat.id]||0;const over=sp>bu&&bu>0;return(<div key={cat.id} style={s.catCard}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><span style={{fontSize:"18px"}}>{cat.icon}</span><span style={s.catLabel}>{cat.label}</span></div><div style={{marginBottom:"10px"}}><span style={{...s.catSpent,color:over?"#FF6B6B":"white"}}>{formatNOK(sp)}</span><span style={s.catBudget}>/ {formatNOK(bu)}</span></div><div style={s.progressBg}><div style={{...s.progressFill,width:`${bu>0?Math.min((sp/bu)*100,100):0}%`,background:over?"#FF6B6B":cat.color}}/></div></div>);})}</div>
              <div style={s.sectionTitle}>TRANSAKSJONER</div>
              {txs.length===0&&<div style={s.empty}>Ingen transaksjoner</div>}
              <div style={{display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"40px"}}>{[...txs].reverse().map(t=>{const cat=CATEGORIES.find(c=>c.id===t.category);return(<div key={t.id} style={s.txItem}><div style={{...s.txDot,background:cat.color}}>{cat.icon}</div><div style={{flex:1}}><div style={s.txDesc}>{t.beskrivelse}</div><div style={s.txMeta}>{cat.label} · {t.date}</div></div><div style={s.txAmount}>−{formatNOK(t.amount)}</div></div>);})}</div>
            </div>
          </div>
        );
      }

      return (
        <div style={s.root}><div style={s.orb1}/><div style={s.orb2}/>
          <div style={s.container}>
            <button onClick={onBack} style={s.backBtn}>← Min budsjett</button>
            <div style={s.headerLabel}>ADMIN</div>
            <h1 style={s.headerTitle}>Brukeroversikt</h1>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"28px"}}>
              <div style={{...s.catCard,textAlign:"center"}}><div style={{fontSize:"32px",fontFamily:"'DM Serif Display',serif",color:"white"}}>{usersData.length}</div><div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Brukere totalt</div></div>
              <div style={{...s.catCard,textAlign:"center"}}><div style={{fontSize:"32px",fontFamily:"'DM Serif Display',serif",color:"white"}}>{usersData.reduce((sum,u)=>sum+(u.transactions||[]).length,0)}</div><div style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Transaksjoner totalt</div></div>
            </div>
            <div style={s.sectionTitle}>ADMINISTRER ADMINS</div>
            <div style={{...s.catCard,marginBottom:"28px"}}>
              <div style={s.flabel}>Legg til admin (e-post)</div>
              <div style={{display:"flex",gap:"10px"}}>
                <input style={{...s.input,flex:1}} type="email" placeholder="bruker@epost.no" value={newAdminEmail} onChange={e=>setNewAdminEmail(e.target.value)}/>
                <button onClick={addAdmin} disabled={addingAdmin} style={{...s.btnPri,flex:"0 0 auto",padding:"12px 18px",width:"auto"}}>{addingAdmin?"...":"Legg til"}</button>
              </div>
              {adminMsg&&<div style={{fontSize:"13px",color:adminMsg.startsWith("✅")?"#A8E6CF":"#FF6B6B",marginTop:"10px"}}>{adminMsg}</div>}
            </div>
            <div style={s.sectionTitle}>ALLE BRUKERE</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"40px"}}>
              {usersData.map(u=>{
                const thisMonth=(u.transactions||[]).filter(t=>new Date(t.date).getMonth()===new Date().getMonth());
                const monthSpent=thisMonth.reduce((sum,t)=>sum+Number(t.amount),0);
                const totalBudget=u.budgets?(u.budgets.mat+u.budgets.transport+u.budgets.fritid+u.budgets.annet):0;
                const over=monthSpent>totalBudget&&totalBudget>0;
                return(<div key={u.user_id} style={{...s.txItem,cursor:"pointer",flexDirection:"column",alignItems:"stretch",gap:"12px"}} onClick={()=>setSelected(u.user_id)}>
                  <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                    <div style={{width:"40px",height:"40px",borderRadius:"12px",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>👤</div>
                    <div style={{flex:1}}><div style={s.txDesc}>{u.email}</div><div style={s.txMeta}>{(u.transactions||[]).length} transaksjoner</div></div>
                    <div style={{textAlign:"right"}}><div style={{...s.txAmount,color:over?"#FF6B6B":"#A8E6CF"}}>{formatNOK(monthSpent)}</div><div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>denne mnd.</div></div>
                  </div>
                  <div style={s.progressBg}><div style={{...s.progressFill,width:`${totalBudget>0?Math.min((monthSpent/totalBudget)*100,100):0}%`,background:over?"#FF6B6B":"#A29BFE"}}/></div>
                </div>);
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────
    function App({ user }) {
      const [view, setView] = useState("oversikt");
      const [transactions, setTransactions] = useState([]);
      const [budgets, setBudgets] = useState({ mat: 5000, transport: 1500, fritid: 2000, annet: 1000 });
      const [form, setForm] = useState({ category: "mat", beskrivelse: "", amount: "", date: today() });
      const [editBudget, setEditBudget] = useState(null);
      const [activeMonth, setActiveMonth] = useState(new Date().getMonth());
      const [loading, setLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAdmin, setShowAdmin] = useState(false);
      const [showScanner, setShowScanner] = useState(false);
      const [showReport, setShowReport] = useState(false);

      useEffect(() => { fetchData(); }, []);

      const fetchData = async () => {
        setLoading(true);
        const [{ data: txData }, { data: budgetData }, { data: adminData }] = await Promise.all([
          supabase.from("transactions").select("*").eq("user_id", user.id),
          supabase.from("budgets").select("*").eq("user_id", user.id).single(),
          supabase.from("admins").select("*").eq("user_id", user.id).single(),
        ]);
        if (txData) setTransactions(txData);
        if (budgetData) setBudgets({ mat: budgetData.mat, transport: budgetData.transport, fritid: budgetData.fritid, annet: budgetData.annet });
        if (adminData) setIsAdmin(true);
        setLoading(false);
      };

      const handleScanResult = (result) => {
        setForm({ category: result.category||"annet", beskrivelse: result.beskrivelse||"", amount: result.amount?String(result.amount):"", date: today() });
        setShowScanner(false);
        setView("legg-til");
      };

      if (showAdmin) return <AdminPanel user={user} onBack={() => setShowAdmin(false)} />;

      const monthTxs = transactions.filter(t => new Date(t.date).getMonth()===activeMonth);
      const spentByCategory = CATEGORIES.reduce((acc,c) => { acc[c.id]=monthTxs.filter(t=>t.category===c.id).reduce((sum,t)=>sum+Number(t.amount),0); return acc; },{});
      const totalSpent = Object.values(spentByCategory).reduce((a,b)=>a+b,0);
      const totalBudget = Object.values(budgets).reduce((a,b)=>a+b,0);
      const pctTotal = totalBudget>0?Math.min(totalSpent/totalBudget,1):0;

      const addTransaction = async () => {
        if (!form.beskrivelse||!form.amount) return;
        const { data, error } = await supabase.from("transactions").insert({ user_id:user.id, category:form.category, beskrivelse:form.beskrivelse, amount:parseFloat(form.amount), date:form.date }).select().single();
        if (!error&&data) setTransactions([...transactions,data]);
        setForm({ category:"mat", beskrivelse:"", amount:"", date:today() });
        setView("oversikt");
      };

      const removeTransaction = async (id) => {
        await supabase.from("transactions").delete().eq("id", id);
        setTransactions(transactions.filter(t=>t.id!==id));
      };

      const saveBudgets = async () => {
        await supabase.from("budgets").upsert({ user_id:user.id, ...editBudget });
        setBudgets({...editBudget});
        setView("oversikt");
      };

      if (loading) return <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.4)"}}>Laster...</div></div>;

      return (
        <div style={s.root}><div style={s.orb1}/><div style={s.orb2}/>
          <div style={s.container}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={s.headerLabel}>FORBRUK</div>
              <div style={{display:"flex",gap:"8px"}}>
                {isAdmin&&<button onClick={()=>setShowAdmin(true)} style={{...s.logoutBtn,color:"#A29BFE",borderColor:"rgba(162,155,254,0.3)"}}>⚙ Admin</button>}
                <button onClick={()=>supabase.auth.signOut()} style={s.logoutBtn}>Logg ut</button>
              </div>
            </div>
            <h1 style={s.headerTitle}>Budsjett</h1>
            <div style={s.monthPicker}>{MONTHS_SHORT.map((m,i)=><button key={i} onClick={()=>setActiveMonth(i)} style={{...s.monthBtn,...(activeMonth===i?s.monthBtnActive:{})}}>{m}</button>)}</div>
            <div style={s.card}>
              <div style={{flex:1}}><div style={s.summaryLabel}>Brukt denne måneden</div><div style={s.summaryAmount}>{formatNOK(totalSpent)}</div><div style={s.summaryOf}>av {formatNOK(totalBudget)} budsjett</div></div>
              <svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="8"/><circle cx="40" cy="40" r="34" fill="none" stroke={totalSpent>totalBudget?"#FF6B6B":"#A8E6CF"} strokeWidth="8" strokeDasharray={`${pctTotal*213.6} 213.6`} strokeLinecap="round" transform="rotate(-90 40 40)"/><text x="40" y="45" textAnchor="middle" fill="white" fontSize="12" fontWeight="700">{Math.round(pctTotal*100)}%</text></svg>
            </div>
            <div style={s.sectionTitle}>KATEGORIER</div>
            <div style={s.grid}>{CATEGORIES.map(cat=>{const spent=spentByCategory[cat.id];const budget=budgets[cat.id];const over=spent>budget;return(<div key={cat.id} style={s.catCard}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><span style={{fontSize:"18px"}}>{cat.icon}</span><span style={s.catLabel}>{cat.label}</span></div><div style={{marginBottom:"10px"}}><span style={{...s.catSpent,color:over?"#FF6B6B":"white"}}>{formatNOK(spent)}</span><span style={s.catBudget}>/ {formatNOK(budget)}</span></div><div style={s.progressBg}><div style={{...s.progressFill,width:`${Math.min((spent/budget)*100,100)}%`,background:over?"#FF6B6B":cat.color}}/></div></div>);})}</div>
            <div style={s.sectionTitle}>TRANSAKSJONER</div>
            {monthTxs.length===0&&<div style={s.empty}>Ingen transaksjoner denne måneden</div>}
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"140px"}}>
              {[...monthTxs].reverse().map(t=>{const cat=CATEGORIES.find(c=>c.id===t.category);return(<div key={t.id} style={s.txItem}><div style={{...s.txDot,background:cat.color}}>{cat.icon}</div><div style={{flex:1}}><div style={s.txDesc}>{t.beskrivelse}</div><div style={s.txMeta}>{cat.label} · {t.date}</div></div><div style={{display:"flex",alignItems:"center",gap:"10px"}}><div style={s.txAmount}>−{formatNOK(t.amount)}</div><button onClick={()=>removeTransaction(t.id)} style={s.txDel}>✕</button></div></div>);})}
            </div>

            <div style={s.fabRow}>
              <button onClick={()=>setShowReport(true)} style={{...s.fabSec,borderColor:"rgba(168,230,207,0.4)",color:"#A8E6CF"}}>📊</button>
              <button onClick={()=>{setEditBudget({...budgets});setView("budsjett");}} style={s.fabSec}>⚙</button>
              <button onClick={()=>setShowScanner(true)} style={{...s.fabSec,borderColor:"rgba(232,168,124,0.4)",color:"#E8A87C"}}>📷</button>
              <button onClick={()=>setView("legg-til")} style={s.fab}>+ Ny utgift</button>
            </div>

            {showReport && <MonthlyReport transactions={transactions} budgets={budgets} onClose={()=>setShowReport(false)} />}
            {showScanner&&<ReceiptScanner onResult={handleScanResult} onClose={()=>setShowScanner(false)}/>}

            {view==="legg-til"&&(
              <div style={s.overlay}><div style={s.modal}>
                <div style={s.modalTitle}>Legg til utgift</div>
                <div style={s.fg}><div style={s.flabel}>Kategori</div><div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{CATEGORIES.map(c=><button key={c.id} onClick={()=>setForm({...form,category:c.id})} style={{...s.catBtn,...(form.category===c.id?{background:c.color,color:"#1a1a2e"}:{})}}>{c.icon} {c.label}</button>)}</div></div>
                <div style={s.fg}><div style={s.flabel}>Beskrivelse</div><input style={s.input} placeholder="F.eks. Meny handletur" value={form.beskrivelse} onChange={e=>setForm({...form,beskrivelse:e.target.value})}/></div>
                <div style={{display:"flex",gap:"14px"}}>
                  <div style={{...s.fg,flex:1}}><div style={s.flabel}>Beløp (kr)</div><input style={s.input} type="number" placeholder="0" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
                  <div style={{...s.fg,flex:1}}><div style={s.flabel}>Dato</div><input style={s.input} type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
                </div>
                <div style={s.modalBtns}><button onClick={()=>setView("oversikt")} style={s.btnSec}>Avbryt</button><button onClick={addTransaction} style={s.btnPri}>Legg til</button></div>
              </div></div>
            )}
            {view==="budsjett"&&editBudget&&(
              <div style={s.overlay}><div style={s.modal}>
                <div style={s.modalTitle}>Rediger budsjett</div>
                {CATEGORIES.map(c=><div key={c.id} style={s.fg}><div style={s.flabel}>{c.icon} {c.label}</div><input style={s.input} type="number" value={editBudget[c.id]} onChange={e=>setEditBudget({...editBudget,[c.id]:parseFloat(e.target.value)||0})}/></div>)}
                <div style={s.modalBtns}><button onClick={()=>setView("oversikt")} style={s.btnSec}>Avbryt</button><button onClick={saveBudgets} style={s.btnPri}>Lagre</button></div>
              </div></div>
            )}
          </div>
        </div>
      );
    }

    // ─── ROOT ────────────────────────────────────────────────────────────────
    function Root() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setChecking(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (checking) return <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.4)"}}>Laster...</div></div>;
      return user ? <App user={user} /> : <Login />;
    }

    const s = {
      root:{minHeight:"100vh",background:"#0f0f1a",fontFamily:"'DM Sans',sans-serif",position:"relative",overflow:"hidden"},
      orb1:{position:"fixed",top:"-120px",right:"-80px",width:"400px",height:"400px",borderRadius:"50%",background:"radial-gradient(circle,rgba(162,155,254,0.18) 0%,transparent 70%)",pointerEvents:"none"},
      orb2:{position:"fixed",bottom:"-100px",left:"-60px",width:"350px",height:"350px",borderRadius:"50%",background:"radial-gradient(circle,rgba(232,168,124,0.14) 0%,transparent 70%)",pointerEvents:"none"},
      container:{maxWidth:"480px",margin:"0 auto",padding:"28px 20px 40px"},
      headerLabel:{fontSize:"11px",letterSpacing:"0.2em",color:"rgba(255,255,255,0.4)",marginBottom:"2px"},
      headerTitle:{fontSize:"32px",fontFamily:"'DM Serif Display',serif",color:"white",margin:"0 0 16px",fontWeight:"400"},
      monthPicker:{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"24px"},
      monthBtn:{padding:"4px 10px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.45)",fontSize:"12px",cursor:"pointer"},
      monthBtnActive:{background:"rgba(162,155,254,0.25)",border:"1px solid rgba(162,155,254,0.6)",color:"#A29BFE"},
      card:{background:"linear-gradient(135deg,#2d2b55 0%,#1e1c3a 100%)",borderRadius:"20px",padding:"24px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"28px",border:"1px solid rgba(162,155,254,0.2)",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"},
      summaryLabel:{fontSize:"12px",color:"rgba(255,255,255,0.5)",letterSpacing:"0.05em",marginBottom:"6px"},
      summaryAmount:{fontSize:"28px",fontFamily:"'DM Serif Display',serif",color:"white",fontWeight:"400"},
      summaryOf:{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginTop:"4px"},
      sectionTitle:{fontSize:"12px",letterSpacing:"0.15em",color:"rgba(255,255,255,0.35)",marginBottom:"14px"},
      grid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"28px"},
      catCard:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"16px",padding:"16px"},
      catLabel:{fontSize:"13px",color:"rgba(255,255,255,0.6)",fontWeight:"500"},
      catSpent:{fontSize:"20px",fontFamily:"'DM Serif Display',serif",fontWeight:"400"},
      catBudget:{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginLeft:"4px"},
      progressBg:{height:"4px",background:"rgba(255,255,255,0.08)",borderRadius:"2px",overflow:"hidden"},
      progressFill:{height:"100%",borderRadius:"2px"},
      txItem:{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"14px 16px"},
      txDot:{width:"40px",height:"40px",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0},
      txDesc:{fontSize:"14px",color:"white",fontWeight:"500"},
      txMeta:{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginTop:"2px"},
      txAmount:{fontSize:"15px",color:"#FF6B6B",fontWeight:"600"},
      txDel:{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:"13px",padding:"4px"},
      empty:{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:"14px",padding:"32px 0"},
      overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,backdropFilter:"blur(6px)"},
      modal:{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px 24px 0 0",padding:"28px 24px 48px",width:"100%",maxWidth:"480px",maxHeight:"90vh",overflowY:"auto"},
      modalTitle:{fontSize:"22px",fontFamily:"'DM Serif Display',serif",color:"white",marginBottom:"0",fontWeight:"400"},
      fg:{marginBottom:"18px"},
      flabel:{fontSize:"12px",color:"rgba(255,255,255,0.45)",letterSpacing:"0.08em",marginBottom:"8px"},
      input:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"12px 14px",color:"white",fontSize:"15px",outline:"none",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"},
      catBtn:{padding:"8px 14px",borderRadius:"10px",border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.7)",fontSize:"13px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      modalBtns:{display:"flex",gap:"12px",marginTop:"24px"},
      btnPri:{flex:1,padding:"14px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",color:"white",fontSize:"15px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      btnSec:{flex:1,padding:"14px",borderRadius:"14px",border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.6)",fontSize:"15px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      fabRow:{position:"fixed",bottom:"28px",left:"50%",transform:"translateX(-50%)",display:"flex",gap:"8px",zIndex:50},
      fab:{padding:"14px 24px",borderRadius:"50px",border:"none",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",color:"white",fontSize:"15px",fontWeight:"600",cursor:"pointer",boxShadow:"0 8px 24px rgba(108,92,231,0.5)",fontFamily:"'DM Sans',sans-serif"},
      fabSec:{padding:"14px 16px",borderRadius:"50px",border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.8)",fontSize:"14px",cursor:"pointer",backdropFilter:"blur(10px)",fontFamily:"'DM Sans',sans-serif"},
      logoutBtn:{padding:"6px 14px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      loginRoot:{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"},
      loginCard:{width:"100%",maxWidth:"400px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"36px 28px"},
      loginTitle:{fontSize:"36px",fontFamily:"'DM Serif Display',serif",color:"white",margin:"0 0 32px",fontWeight:"400"},
      backBtn:{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"13px",cursor:"pointer",padding:"0",marginBottom:"20px",fontFamily:"'DM Sans',sans-serif"},
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
