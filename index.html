<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://vaivnbwpatdxvgirhrht.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MYU_ipmt9d88qx6GnvjHCA_ysGl2aiF";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATEGORIES = [
      { id: "mat", label: "Mat & Drikke", icon: "mat", color: "#E8A87C" },
      { id: "transport", label: "Transport", icon: "transport", color: "#85C1E9" },
      { id: "fritid", label: "Fritid", icon: "fritid", color: "#A29BFE" },
      { id: "annet", label: "Annet", icon: "annet", color: "#81ECEC" },
    ];

    const MONTHS = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];
    const CatIcon = ({ id, size=18, color="currentColor" }) => {
      const icons = {
        mat: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
        transport: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
        fritid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>,
        annet: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>,
      };
      return icons[id] || null;
    };

    const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
    const formatNOK = (n) => new Intl.NumberFormat("nb-NO", { style: "currency", currency: "NOK", maximumFractionDigits: 0 }).format(n);
    const today = () => new Date().toISOString().split("T")[0];

    // ─── MONTHLY REPORT ──────────────────────────────────────────────────────
    function MonthlyReport({ transactions, budgets, onClose }) {
      const [reportMonth, setReportMonth] = useState(new Date().getMonth());
      const [reportYear, setReportYear] = useState(new Date().getFullYear());

      const getTxs = (month, year) => transactions.filter(t => {
        const d = new Date(t.date);
        return d.getMonth() === month && d.getFullYear() === year;
      });

      const getSpent = (month, year) => CATEGORIES.reduce((acc, c) => {
        acc[c.id] = getTxs(month, year).filter(t => t.category === c.id).reduce((sum, t) => sum + Number(t.amount), 0);
        return acc;
      }, {});

      const monthTxs = getTxs(reportMonth, reportYear);
      const spentByCategory = getSpent(reportMonth, reportYear);
      const totalSpent = Object.values(spentByCategory).reduce((a, b) => a + b, 0);
      const totalBudget = Object.values(budgets).reduce((a, b) => a + b, 0);
      const saved = totalBudget - totalSpent;

      // Previous month
      const prevMonth = reportMonth === 0 ? 11 : reportMonth - 1;
      const prevYear = reportMonth === 0 ? reportYear - 1 : reportYear;
      const prevSpent = getSpent(prevMonth, prevYear);
      const prevTotal = Object.values(prevSpent).reduce((a, b) => a + b, 0);

      // Same month last year
      const lastYearSpent = getSpent(reportMonth, reportYear - 1);
      const lastYearTotal = Object.values(lastYearSpent).reduce((a, b) => a + b, 0);

      const diffArrow = (current, previous) => {
        if (previous === 0) return null;
        const diff = current - previous;
        const pct = Math.round(Math.abs(diff / previous) * 100);
        return diff > 0
          ? <span style={{fontSize:"11px",color:"#FF6B6B",marginLeft:"6px"}}>↑ {pct}%</span>
          : <span style={{fontSize:"11px",color:"#A8E6CF",marginLeft:"6px"}}>↓ {pct}%</span>;
      };

      const printReport = () => {
        const printContent = document.getElementById("report-content").innerHTML;
        const win = window.open("", "_blank");
        win.document.write(`
          <html><head><title>Månedsrapport ${MONTHS[reportMonth]} ${reportYear}</title>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
          <style>
            body { font-family: 'DM Sans', sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
            h1 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 8px; }
            .subtitle { color: #666; margin-bottom: 32px; }
            .card { border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
            .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
            .cat-row:last-child { border-bottom: none; }
            .cat-name { display: flex; align-items: center; gap: 8px; }
            .progress { height: 6px; background: #f0f0f0; border-radius: 3px; margin-top: 6px; }
            .progress-fill { height: 100%; border-radius: 3px; }
            .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 600; padding-top: 16px; border-top: 2px solid #333; margin-top: 8px; }
            .saved { color: ${saved >= 0 ? '#2ecc71' : '#e74c3c'}; }
            .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
            .summary-card { border: 1px solid #eee; border-radius: 12px; padding: 16px; text-align: center; }
            .summary-amount { font-size: 24px; font-family: 'DM Serif Display', serif; }
            .summary-label { font-size: 12px; color: #666; margin-top: 4px; }
          </style></head><body>${printContent}</body></html>
        `);
        win.document.close();
        win.print();
      };

      return (
        <div style={s.overlay}>
          <div style={{...s.modal, maxHeight:"85vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
              <div style={s.modalTitle}>Månedsrapport</div>
              <button onClick={onClose} style={{...s.logoutBtn}}>✕</button>
            </div>

            {/* Month/Year selector */}
            <div style={{display:"flex",gap:"10px",marginBottom:"24px",alignItems:"center"}}>
              <select value={reportMonth} onChange={e => setReportMonth(Number(e.target.value))}
                style={{...s.input, flex:1}}>
                {MONTHS.map((m, i) => <option key={i} value={i} style={{background:"#1a1a2e"}}>{m}</option>)}
              </select>
              <select value={reportYear} onChange={e => setReportYear(Number(e.target.value))}
                style={{...s.input, flex:"0 0 100px"}}>
                {[2024,2025,2026,2027].map(y => <option key={y} value={y} style={{background:"#1a1a2e"}}>{y}</option>)}
              </select>
            </div>

            <div id="report-content">
              <h1 style={{fontFamily:"'DM Serif Display',serif",color:"white",fontSize:"26px",marginBottom:"4px"}}>
                {MONTHS[reportMonth]} {reportYear}
              </h1>
              <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginBottom:"24px"}}>Månedsrapport</div>

              {/* Summary cards */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"24px"}}>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:"#FF6B6B"}}>{formatNOK(totalSpent)}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Brukt</div>
                </div>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:"rgba(255,255,255,0.7)"}}>{formatNOK(totalBudget)}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>Budsjett</div>
                </div>
                <div style={{...s.catCard,textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontFamily:"'DM Serif Display',serif",color:saved>=0?"#A8E6CF":"#FF6B6B"}}>{formatNOK(Math.abs(saved))}</div>
                  <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginTop:"4px"}}>{saved>=0?"Spart":"Overforbruk"}</div>
                </div>
              </div>

              {/* Category breakdown */}
              <div style={{...s.catCard,marginBottom:"16px"}}>
                {CATEGORIES.map((cat, i) => {
                  const spent = spentByCategory[cat.id];
                  const budget = budgets[cat.id];
                  const pct = budget > 0 ? Math.min((spent/budget)*100, 100) : 0;
                  const over = spent > budget;
                  return (
                    <div key={cat.id} style={{paddingBottom: i<CATEGORIES.length-1?"16px":"0", marginBottom: i<CATEGORIES.length-1?"16px":"0", borderBottom: i<CATEGORIES.length-1?"1px solid rgba(255,255,255,0.06)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <CatIcon id={cat.id} size={16} color={cat.color} />
                          <span style={{fontSize:"14px",color:"rgba(255,255,255,0.8)"}}>{cat.label}</span>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <span style={{fontSize:"15px",fontWeight:"600",color:over?"#FF6B6B":"white"}}>{formatNOK(spent)}</span>
                          <span style={{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginLeft:"4px"}}>/ {formatNOK(budget)}</span>
                          {diffArrow(spent, prevSpent[cat.id])}
                        </div>
                      </div>
                      <div style={s.progressBg}>
                        <div style={{...s.progressFill, width:`${pct}%`, background:over?"#FF6B6B":cat.color}}/>
                      </div>
                      <div style={{display:"flex",gap:"16px",marginTop:"6px"}}>
                        {prevTotal > 0 && <span style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>Forrige mnd: {formatNOK(prevSpent[cat.id])}</span>}
                        {lastYearTotal > 0 && <span style={{fontSize:"11px",color:"rgba(255,255,255,0.3)"}}>I fjor: {formatNOK(lastYearSpent[cat.id])}</span>}
                      </div>
                      {over && <div style={{fontSize:"12px",color:"#FF6B6B",marginTop:"4px"}}>Overforbruk: {formatNOK(spent-budget)}</div>}
                    </div>
                  );
                })}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:"16px",borderTop:"1px solid rgba(255,255,255,0.1)",marginTop:"8px"}}>
                  <span style={{fontSize:"14px",color:"rgba(255,255,255,0.6)",fontWeight:"600"}}>Totalt</span>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:"15px",fontWeight:"600",color:totalSpent>totalBudget?"#FF6B6B":"white"}}>{formatNOK(totalSpent)}</span>
                    {diffArrow(totalSpent, prevTotal)}
                  </div>
                </div>
                <div style={{display:"flex",gap:"16px",marginTop:"8px",paddingTop:"8px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                  {prevTotal > 0 && <span style={{fontSize:"12px",color:"rgba(255,255,255,0.35)"}}>Forrige mnd: {formatNOK(prevTotal)} {diffArrow(totalSpent,prevTotal)}</span>}
                  {lastYearTotal > 0 && <span style={{fontSize:"12px",color:"rgba(255,255,255,0.35)"}}>Same mnd i fjor: {formatNOK(lastYearTotal)}</span>}
                </div>
              </div>

              {monthTxs.length === 0 && <div style={s.empty}>Ingen transaksjoner denne måneden</div>}
            </div>

            <button onClick={printReport} style={{...s.btnPri,width:"100%",marginTop:"8px"}}>
              🖨️ Last ned / Skriv ut PDF
            </button>
          </div>
        </div>
      );
    }


    // ─── STATEMENT IMPORTER ──────────────────────────────────────────────────
    function StatementImporter({ onImport, onClose }) {
      const [status, setStatus] = useState("idle"); // idle | reading | analyzing | done | error
      const [preview, setPreview] = useState([]);
      const [error, setError] = useState("");
      const [progress, setProgress] = useState("");
      const fileRef = useRef();

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setStatus("reading");
        setError("");

        try {
          let text = "";

          if (file.name.endsWith(".csv") || file.name.endsWith(".txt")) {
            text = await file.text();
          } else if (file.name.endsWith(".xlsx") || file.name.endsWith(".xls")) {
            setProgress("Leser Excel-fil...");
            const XLSX = window.XLSX;
            const buf = await file.arrayBuffer();
            const wb = XLSX.read(buf);
            const ws = wb.Sheets[wb.SheetNames[0]];
            text = XLSX.utils.sheet_to_csv(ws);
          } else if (file.type === "application/pdf") {
            setProgress("Leser PDF...");
            const pdfjsLib = window.pdfjsLib;
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            const buf = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              text += textContent.items.map(item => item.str).join(" ") + "\n";
            }
          } else {
            throw new Error("Støtter kun PDF, Excel (.xlsx) eller CSV-filer");
          }

          if (!text.trim()) throw new Error("Kunne ikke lese innhold fra filen");

          setStatus("analyzing");
          setProgress("Claude analyserer kontoutskriften...");

          const response = await fetch("/.netlify/functions/scan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "statement", text: text.slice(0, 15000) }),
          });

          const data = await response.json();
          if (data.error) throw new Error(data.error.message);

          const raw = data.content[0].text.trim().replace(/```json|```/g, "").trim();
          const transactions = JSON.parse(raw);

          if (!Array.isArray(transactions)) throw new Error("Uventet svar fra Claude");

          setPreview(transactions);
          setStatus("done");
          setProgress("");
        } catch (err) {
          setError(err.message || "Noe gikk galt");
          setStatus("error");
        }
      };

      return (
        <div style={s.overlay}>
          <div style={{...s.modal, maxHeight:"85vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
              <div style={s.modalTitle}>Importer kontoutskrift</div>
              <button onClick={onClose} style={s.logoutBtn}>✕</button>
            </div>

            <input ref={fileRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.txt"
              style={{display:"none"}} onChange={handleFile} />

            {status === "idle" && (
              <div>
                <p style={{fontSize:"14px",color:"rgba(255,255,255,0.5)",marginBottom:"20px",lineHeight:"1.6"}}>
                  Last opp kontoutskrift som PDF, Excel eller CSV. Kun utgående betalinger importeres.
                </p>
                <button onClick={()=>fileRef.current.click()} style={{...s.btnPri,width:"100%"}}>
                  Velg fil
                </button>
              </div>
            )}

            {(status === "reading" || status === "analyzing") && (
              <div style={{textAlign:"center",padding:"32px 0"}}>
                <div style={{fontSize:"32px",marginBottom:"16px"}}>⏳</div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:"14px"}}>{progress}</div>
              </div>
            )}

            {status === "error" && (
              <div>
                <div style={{color:"#FF6B6B",fontSize:"14px",marginBottom:"16px"}}>{error}</div>
                <button onClick={()=>setStatus("idle")} style={{...s.btnSec,width:"100%"}}>Prøv igjen</button>
              </div>
            )}

            {status === "done" && (
              <div>
                <div style={{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginBottom:"16px"}}>
                  Fant {preview.length} transaksjoner – alle importeres automatisk
                </div>
                <div style={{maxHeight:"320px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"8px",marginBottom:"20px"}}>
                  {preview.map((tx, i) => {
                    const cat = CATEGORIES.find(c => c.id === tx.category) || CATEGORIES[3];
                    return (
                      <div key={i} style={{...s.txItem,padding:"10px 14px"}}>
                        <div style={{...s.txDot,width:"32px",height:"32px",background:cat.color}}>
                          <CatIcon id={cat.id} size={14} color="white"/>
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"13px",color:"white",fontWeight:"500"}}>{tx.beskrivelse}</div>
                          <div style={{fontSize:"11px",color:"rgba(255,255,255,0.35)"}}>{cat.label} · {tx.date}</div>
                        </div>
                        <div style={{fontSize:"14px",color:"#FF6B6B",fontWeight:"600"}}>−{formatNOK(tx.amount)}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={s.modalBtns}>
                  <button onClick={onClose} style={s.btnSec}>Avbryt</button>
                  <button onClick={()=>onImport(preview)} style={s.btnPri}>
                    Importer alle ({preview.length})
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }


    // ─── RECEIPT THUMB ───────────────────────────────────────────────────────
    function ReceiptThumb({ path }) {
      const [url, setUrl] = useState(null);
      const [expanded, setExpanded] = useState(false);

      useEffect(() => {
        if (!path) return;
        supabase.storage.from("kvitteringer").createSignedUrl(path, 3600)
          .then(({ data }) => { if (data) setUrl(data.signedUrl); });
      }, [path]);

      if (!url) return null;

      return (
        <div>
          <img src={url} onClick={() => setExpanded(true)}
            style={{width:"100%",borderRadius:"8px",maxHeight:"80px",objectFit:"cover",cursor:"pointer",opacity:0.8}} />
          {expanded && (
            <div onClick={() => setExpanded(false)}
              style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"20px"}}>
              <img src={url} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:"12px",objectFit:"contain"}} />
            </div>
          )}
        </div>
      );
    }

    // ─── LOGIN ───────────────────────────────────────────────────────────────
    function Login() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [mode, setMode] = useState("login"); // login | register | forgot
      const [forgotSent, setForgotSent] = useState(false);

      const submit = async () => {
        if (!email || (!password && mode !== "forgot")) return;
        setLoading(true);
        setError("");
        if (mode === "forgot") {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: "https://dagligbudsjett.netlify.app"
          });
          setLoading(false);
          if (error) setError(error.message);
          else setForgotSent(true);
          return;
        }
        const result = mode === "login"
          ? await supabase.auth.signInWithPassword({ email, password })
          : await supabase.auth.signUp({ email, password });
        setLoading(false);
        if (result.error) setError(result.error.message);
      };

      return (
        <div style={s.loginRoot}>
          <div style={s.loginCard}>
            <div style={s.headerLabel}>FORBRUK</div>
            <h1 style={s.loginTitle}>Budsjett</h1>

            {mode === "forgot" ? (
              forgotSent ? (
                <div>
                  <div style={{fontSize:"22px",color:"white",marginBottom:"12px"}}>✅ Sjekk e-posten din!</div>
                  <div style={{fontSize:"14px",color:"rgba(255,255,255,0.5)",lineHeight:"1.6",marginBottom:"24px"}}>
                    Vi sendte en lenke for å nullstille passordet til <strong style={{color:"white"}}>{email}</strong>
                  </div>
                  <button onClick={() => { setMode("login"); setForgotSent(false); }} style={{...s.btnSec,width:"100%"}}>
                    Tilbake til innlogging
                  </button>
                </div>
              ) : (
                <div>
                  <div style={s.fg}>
                    <div style={s.flabel}>E-postadresse</div>
                    <input style={s.input} type="email" placeholder="din@epost.no"
                      value={email} onChange={e => setEmail(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && submit()} />
                  </div>
                  {error && <div style={{color:"#FF6B6B",fontSize:"13px",marginBottom:"12px"}}>{error}</div>}

    // ─── RECEIPT SCANNER ─────────────────────────────────────────────────────
    function ReceiptScanner({ onResult, onClose }) {
      const [scanning, setScanning] = useState(false);
      const [rawImage, setRawImage] = useState(null);
      const [rawFile, setRawFile] = useState(null);
      const [cropping, setCropping] = useState(false);
      const [error, setError] = useState("");
      const fileRef = useRef();
      const canvasRef = useRef();
      const imgRef = useRef();
      const [cropStart, setCropStart] = useState(null);
      const [cropRect, setCropRect] = useState(null);
      const [dragging, setDragging] = useState(false);

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setRawFile(file);
        const reader = new FileReader();
        reader.onload = (ev) => {
          setRawImage(ev.target.result);
          setCropping(true);
          setCropRect(null);
        };
        reader.readAsDataURL(file);
      };

      const getPos = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * (canvas.width / rect.width),
          y: (clientY - rect.top) * (canvas.height / rect.height)
        };
      };

      const onMouseDown = (e) => {
        e.preventDefault();
        const pos = getPos(e, canvasRef.current);
        setCropStart(pos);
        setCropRect(null);
        setDragging(true);
      };

      const onMouseMove = (e) => {
        if (!dragging || !cropStart) return;
        e.preventDefault();
        const pos = getPos(e, canvasRef.current);
        setCropRect({
          x: Math.min(cropStart.x, pos.x),
          y: Math.min(cropStart.y, pos.y),
          w: Math.abs(pos.x - cropStart.x),
          h: Math.abs(pos.y - cropStart.y)
        });
      };

      const onMouseUp = () => setDragging(false);

      useEffect(() => {
        if (!cropping || !rawImage || !canvasRef.current) return;
        const img = new Image();
        img.onload = () => {
          const canvas = canvasRef.current;
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          if (cropRect) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, cropRect.x, cropRect.y, cropRect.w, cropRect.h, cropRect.x, cropRect.y, cropRect.w, cropRect.h);
            ctx.strokeStyle = "#A29BFE";
            ctx.lineWidth = 3;
            ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
          }
        };
        img.src = rawImage;
      }, [rawImage, cropRect, cropping]);

      const applyCrop = async () => {
        const img = new Image();
        img.onload = async () => {
          const canvas = document.createElement("canvas");
          const rect = cropRect || { x: 0, y: 0, w: img.width, h: img.height };
          canvas.width = rect.w;
          canvas.height = rect.h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
          const croppedDataUrl = canvas.toDataURL("image/jpeg", 0.85);
          const base64 = croppedDataUrl.split(",")[1];
          setCropping(false);
          setScanning(true);
          setError("");
          try {
            const response = await fetch("/.netlify/functions/scan", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ image: base64, mimeType: "image/jpeg" }),
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            const text = data.content[0].text.trim().replace(/```json|```/g, "").trim();
            const result = JSON.parse(text);
            const croppedFile = await fetch(croppedDataUrl).then(r => r.blob()).then(b => new File([b], "kvittering.jpg", { type: "image/jpeg" }));
            onResult(result, croppedFile, croppedDataUrl);
          } catch (err) {
            setError("Kunne ikke lese kvitteringen. Prøv et klarere bilde.");
            setScanning(false);
          }
        };
        img.src = rawImage;
      };

      return (
        <div style={s.overlay}>
          <div style={{...s.modal, maxHeight:"90vh"}}>
            <div style={s.modalTitle}>Scan kvittering</div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} />

            {!rawImage && !scanning && (
              <div>
                <p style={{fontSize:"14px",color:"rgba(255,255,255,0.5)",marginBottom:"20px",lineHeight:"1.6"}}>
                  Ta bilde av kvitteringen eller last opp fra kamerarulle.
                </p>
                <button onClick={() => fileRef.current.click()} style={{...s.btnPri,width:"100%",marginBottom:"12px"}}>
                  Ta bilde / Last opp
                </button>
              </div>
            )}

            {cropping && rawImage && (
              <div>
                <p style={{fontSize:"13px",color:"rgba(255,255,255,0.5)",marginBottom:"10px"}}>
                  Dra for å beskjære – eller trykk "Bruk hele bildet"
                </p>
                <canvas ref={canvasRef}
                  style={{width:"100%",borderRadius:"10px",touchAction:"none",cursor:"crosshair",marginBottom:"12px"}}
                  onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp}
                  onTouchStart={onMouseDown} onTouchMove={onMouseMove} onTouchEnd={onMouseUp}
                />
                <div style={s.modalBtns}>
                  <button onClick={() => { setCropRect(null); applyCrop(); }} style={s.btnSec}>Bruk hele bildet</button>
                  <button onClick={applyCrop} disabled={!cropRect} style={{...s.btnPri, opacity: cropRect ? 1 : 0.4}}>Beskjær og analyser</button>
                </div>
              </div>
            )}

            {scanning && (
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:"32px",marginBottom:"12px"}}>🔍</div>
                <div style={{color:"rgba(255,255,255,0.6)"}}>Analyserer kvittering...</div>
              </div>
            )}
            {error && <div style={{color:"#FF6B6B",fontSize:"13px",marginBottom:"16px"}}>{error}</div>}
            <button onClick={onClose} style={{...s.btnSec,width:"100%",marginTop:"8px"}}>Avbryt</button>
          </div>
        </div>
      );
    }

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={s.headerLabel}>FORBRUK</div>
              <div style={{display:"flex",gap:"8px"}}>
                {isAdmin&&<button onClick={()=>setShowAdmin(true)} style={{...s.logoutBtn,color:"#A29BFE",borderColor:"rgba(162,155,254,0.3)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" style={{marginRight:"4px",verticalAlign:"middle"}}><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Admin</button>}
                <button onClick={()=>setShowInstall(true)} style={{...s.logoutBtn,color:"rgba(255,255,255,0.4)"}}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{marginRight:"4px",verticalAlign:"middle"}}><path d="M12 2v13M7 9l5 5 5-5"/><path d="M3 20h18"/></svg>
                  App
                </button>
                <button onClick={()=>supabase.auth.signOut()} style={s.logoutBtn}>Logg ut</button>
              </div>
            </div>
            <h1 style={s.headerTitle}>Budsjett</h1>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
              <button onClick={()=>setActiveYear(y=>y-1)} style={{...s.monthBtn,padding:"4px 10px"}}>‹</button>
              <span style={{fontSize:"13px",color:"rgba(255,255,255,0.6)",fontWeight:"500"}}>{activeYear}</span>
              <button onClick={()=>setActiveYear(y=>y+1)} style={{...s.monthBtn,padding:"4px 10px"}}>›</button>
            </div>
            <div style={s.monthPicker}>{MONTHS_SHORT.map((m,i)=><button key={i} onClick={()=>setActiveMonth(i)} style={{...s.monthBtn,...(activeMonth===i?s.monthBtnActive:{})}}>{m}</button>)}</div>
            <div style={s.card}>
              <div style={{flex:1}}><div style={s.summaryLabel}>Brukt denne måneden</div><div style={s.summaryAmount}>{formatNOK(totalSpent)}</div><div style={s.summaryOf}>av {formatNOK(totalBudget)} budsjett</div></div>
              <svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="8"/><circle cx="40" cy="40" r="34" fill="none" stroke={totalSpent>totalBudget?"#FF6B6B":"#A8E6CF"} strokeWidth="8" strokeDasharray={`${pctTotal*213.6} 213.6`} strokeLinecap="round" transform="rotate(-90 40 40)"/><text x="40" y="45" textAnchor="middle" fill="white" fontSize="12" fontWeight="700">{Math.round(pctTotal*100)}%</text></svg>
            </div>
            <div style={s.sectionTitle}>KATEGORIER</div>
            <div style={s.grid}>{CATEGORIES.map(cat=>{const spent=spentByCategory[cat.id];const budget=budgets[cat.id];const over=spent>budget;return(<div key={cat.id} style={s.catCard}><div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><CatIcon id={cat.id} size={18} color={cat.color} /><span style={s.catLabel}>{cat.label}</span></div><div style={{marginBottom:"10px"}}><span style={{...s.catSpent,color:over?"#FF6B6B":"white"}}>{formatNOK(spent)}</span><span style={s.catBudget}>/ {formatNOK(budget)}</span></div><div style={s.progressBg}><div style={{...s.progressFill,width:`${Math.min((spent/budget)*100,100)}%`,background:over?"#FF6B6B":cat.color}}/></div></div>);})}</div>
            <div style={s.sectionTitle}>TRANSAKSJONER</div>
            {monthTxs.length===0&&<div style={s.empty}>Ingen transaksjoner denne måneden</div>}
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"140px"}}>
              {[...monthTxs].reverse().map(t=>{const cat=CATEGORIES.find(c=>c.id===t.category);return(
  <div key={t.id} style={{...s.txItem,flexDirection:"column",alignItems:"stretch",gap:"8px"}}>
    <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
      <div style={{...s.txDot,background:cat.color}}><CatIcon id={cat.id} size={18} color="white" /></div>
      <div style={{flex:1}}><div style={s.txDesc}>{t.beskrivelse}</div><div style={s.txMeta}>{cat.label} · {t.date}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <div style={s.txAmount}>−{formatNOK(t.amount)}</div>
        <button onClick={()=>removeTransaction(t.id)} style={s.txDel}>✕</button>
      </div>
    </div>
    {t.receipt_url && <ReceiptThumb path={t.receipt_url} />}
  </div>
);})}
            </div>

            <div style={s.fabRow}>
              <button onClick={()=>setShowReport(true)} style={{...s.fabSec,color:"#A8E6CF"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 17V13"/><path d="M12 17V7"/><path d="M16 17V11"/></svg>
                <span style={{fontSize:"10px"}}>Rapport</span>
              </button>
              <button onClick={()=>{setEditBudget({...budgets});setView("budsjett");}} style={s.fabSec}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <span style={{fontSize:"10px"}}>Budsjett</span>
              </button>
              <button onClick={()=>setView("legg-til")} style={{...s.fabSec,color:"white"}}>
                <div style={{width:"42px",height:"42px",borderRadius:"14px",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(108,92,231,0.5)"}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <span style={{fontSize:"10px"}}>Ny utgift</span>
              </button>
              <button onClick={()=>setShowImport(true)} style={{...s.fabSec,color:"#81ECEC"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span style={{fontSize:"10px"}}>Importer</span>
              </button>
              <button onClick={()=>setShowScanner(true)} style={{...s.fabSec,color:"#E8A87C"}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span style={{fontSize:"10px"}}>Scan</span>
              </button>
            </div>

            {showReport && <MonthlyReport transactions={transactions} budgets={budgets} onClose={()=>setShowReport(false)} />}

            {showInstall && (
              <div style={s.overlay}>
                <div style={s.modal}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
                    <div style={s.modalTitle}>Legg til på hjemskjerm</div>
                    <button onClick={()=>setShowInstall(false)} style={s.logoutBtn}>✕</button>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"14px"}}>
                      <div style={{fontSize:"24px",flexShrink:0}}>1</div>
                      <div style={{fontSize:"14px",color:"rgba(255,255,255,0.7)",lineHeight:"1.5"}}>Åpne appen i <strong style={{color:"white"}}>Safari</strong> på iPhone</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"14px"}}>
                      <div style={{fontSize:"24px",flexShrink:0}}>2</div>
                      <div style={{fontSize:"14px",color:"rgba(255,255,255,0.7)",lineHeight:"1.5"}}>Trykk på <strong style={{color:"white"}}>Del-ikonet</strong> nederst i Safari<br/><span style={{fontSize:"22px"}}>⬆️</span></div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"14px"}}>
                      <div style={{fontSize:"24px",flexShrink:0}}>3</div>
                      <div style={{fontSize:"14px",color:"rgba(255,255,255,0.7)",lineHeight:"1.5"}}>Scroll ned og trykk <strong style={{color:"white"}}>"Legg til på hjemskjerm"</strong></div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"14px"}}>
                      <div style={{fontSize:"24px",flexShrink:0}}>4</div>
                      <div style={{fontSize:"14px",color:"rgba(255,255,255,0.7)",lineHeight:"1.5"}}>Trykk <strong style={{color:"white"}}>"Legg til"</strong> øverst til høyre</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowInstall(false)} style={{...s.btnPri,width:"100%",marginTop:"20px"}}>Forstått</button>
                </div>
              </div>
            )}
            {showImport&&<StatementImporter onImport={async (txs) => {
              for (const tx of txs) {
                const { data, error } = await supabase.from("transactions").insert({
                  user_id: user.id, category: tx.category, beskrivelse: tx.beskrivelse,
                  amount: tx.amount, date: tx.date
                }).select().single();
                if (!error && data) setTransactions(prev => [...prev, data]);
              }
              setShowImport(false);
            }} onClose={()=>setShowImport(false)}/>}
            {showScanner&&<ReceiptScanner onResult={handleScanResult} onClose={()=>setShowScanner(false)}/>}

            {view==="legg-til"&&(
              <div style={s.overlay}><div style={s.modal}>
                <div style={s.modalTitle}>Legg til utgift</div>
                <div style={s.fg}><div style={s.flabel}>Kategori</div><div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>{CATEGORIES.map(c=><button key={c.id} onClick={()=>setForm({...form,category:c.id})} style={{...s.catBtn,...(form.category===c.id?{background:c.color,color:"#1a1a2e"}:{})}}><CatIcon id={c.id} size={14} color="currentColor" /> {c.label}</button>)}</div></div>
                <div style={s.fg}><div style={s.flabel}>Beskrivelse</div><input style={s.input} placeholder="F.eks. Meny handletur" value={form.beskrivelse} onChange={e=>setForm({...form,beskrivelse:e.target.value})}/></div>
                <div style={{display:"flex",gap:"14px"}}>
                  <div style={{...s.fg,flex:1}}><div style={s.flabel}>Beløp (kr)</div><input style={s.input} type="number" placeholder="0" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
                  <div style={{...s.fg,flex:1}}><div style={s.flabel}>Dato</div><input style={s.input} type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
                </div>
                {form.receiptPreview && (
                  <div style={{marginBottom:"16px"}}>
                    <div style={s.flabel}>Kvittering</div>
                    <img src={form.receiptPreview} style={{width:"100%",borderRadius:"12px",maxHeight:"160px",objectFit:"cover"}}/>
                  </div>
                )}
                <div style={s.modalBtns}><button onClick={()=>setView("oversikt")} style={s.btnSec}>Avbryt</button><button onClick={addTransaction} style={s.btnPri}>Legg til</button></div>
              </div></div>
            )}
            {view==="budsjett"&&editBudget&&(
              <div style={s.overlay}><div style={s.modal}>
                <div style={s.modalTitle}>Rediger budsjett</div>
                <div style={{display:"flex",gap:"10px",marginBottom:"20px",alignItems:"center"}}>
                  <select value={activeMonth} onChange={e=>{setActiveMonth(Number(e.target.value));setEditBudget({...budgets});}}
                    style={{...s.input,flex:1}}>
                    {MONTHS_SHORT.map((m,i)=><option key={i} value={i} style={{background:"#1a1a2e"}}>{m}</option>)}
                  </select>
                  <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                    <button onClick={()=>setActiveYear(y=>y-1)} style={{...s.monthBtn,padding:"8px 12px"}}>‹</button>
                    <span style={{fontSize:"14px",color:"white",fontWeight:"500",minWidth:"44px",textAlign:"center"}}>{activeYear}</span>
                    <button onClick={()=>setActiveYear(y=>y+1)} style={{...s.monthBtn,padding:"8px 12px"}}>›</button>
                  </div>
                </div>
                {CATEGORIES.map(c=><div key={c.id} style={s.fg}><div style={s.flabel}><CatIcon id={c.id} size={14} color="currentColor" /> {c.label}</div><input style={s.input} type="number" value={editBudget[c.id]} onChange={e=>setEditBudget({...editBudget,[c.id]:parseFloat(e.target.value)||0})}/></div>)}
                <div style={s.modalBtns}><button onClick={()=>setView("oversikt")} style={s.btnSec}>Avbryt</button><button onClick={saveBudgets} style={s.btnPri}>Lagre</button></div>
              </div></div>
            )}
          </div>
        </div>
      );
    }

    // ─── ROOT ────────────────────────────────────────────────────────────────
    function Root() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setChecking(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (checking) return <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"rgba(255,255,255,0.4)"}}>Laster...</div></div>;
      return user ? <App user={user} /> : <Login />;
    }

    const s = {
      root:{minHeight:"100vh",background:"#0f0f1a",fontFamily:"'DM Sans',sans-serif",position:"relative",overflow:"hidden"},
      orb1:{position:"fixed",top:"-120px",right:"-80px",width:"400px",height:"400px",borderRadius:"50%",background:"radial-gradient(circle,rgba(162,155,254,0.18) 0%,transparent 70%)",pointerEvents:"none"},
      orb2:{position:"fixed",bottom:"-100px",left:"-60px",width:"350px",height:"350px",borderRadius:"50%",background:"radial-gradient(circle,rgba(232,168,124,0.14) 0%,transparent 70%)",pointerEvents:"none"},
      container:{maxWidth:"480px",margin:"0 auto",padding:"28px 20px 40px"},
      headerLabel:{fontSize:"11px",letterSpacing:"0.2em",color:"rgba(255,255,255,0.4)",marginBottom:"2px"},
      headerTitle:{fontSize:"32px",fontFamily:"'DM Sans',sans-serif",color:"white",margin:"0 0 16px",fontWeight:"400"},
      monthPicker:{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"24px"},
      monthBtn:{padding:"4px 10px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.45)",fontSize:"12px",cursor:"pointer"},
      monthBtnActive:{background:"rgba(162,155,254,0.25)",border:"1px solid rgba(162,155,254,0.6)",color:"#A29BFE"},
      card:{background:"linear-gradient(135deg,#2d2b55 0%,#1e1c3a 100%)",borderRadius:"20px",padding:"24px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"28px",border:"1px solid rgba(162,155,254,0.2)",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"},
      summaryLabel:{fontSize:"12px",color:"rgba(255,255,255,0.5)",letterSpacing:"0.05em",marginBottom:"6px"},
      summaryAmount:{fontSize:"28px",fontFamily:"'DM Serif Display',serif",color:"white",fontWeight:"400"},
      summaryOf:{fontSize:"13px",color:"rgba(255,255,255,0.4)",marginTop:"4px"},
      sectionTitle:{fontSize:"12px",letterSpacing:"0.15em",color:"rgba(255,255,255,0.35)",marginBottom:"14px"},
      grid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"28px"},
      catCard:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"16px",padding:"16px"},
      catLabel:{fontSize:"13px",color:"rgba(255,255,255,0.6)",fontWeight:"500"},
      catSpent:{fontSize:"20px",fontFamily:"'DM Serif Display',serif",fontWeight:"400"},
      catBudget:{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginLeft:"4px"},
      progressBg:{height:"4px",background:"rgba(255,255,255,0.08)",borderRadius:"2px",overflow:"hidden"},
      progressFill:{height:"100%",borderRadius:"2px"},
      txItem:{display:"flex",alignItems:"center",gap:"14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"14px",padding:"14px 16px"},
      txDot:{width:"40px",height:"40px",borderRadius:"12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0},
      txDesc:{fontSize:"14px",color:"white",fontWeight:"500"},
      txMeta:{fontSize:"12px",color:"rgba(255,255,255,0.35)",marginTop:"2px"},
      txAmount:{fontSize:"15px",color:"#FF6B6B",fontWeight:"600"},
      txDel:{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:"13px",padding:"4px"},
      empty:{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:"14px",padding:"32px 0"},
      overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100,backdropFilter:"blur(6px)"},
      modal:{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px 24px 0 0",padding:"28px 24px 48px",width:"100%",maxWidth:"480px",maxHeight:"90vh",overflowY:"auto"},
      modalTitle:{fontSize:"22px",fontFamily:"'DM Serif Display',serif",color:"white",marginBottom:"0",fontWeight:"400"},
      fg:{marginBottom:"18px"},
      flabel:{fontSize:"12px",color:"rgba(255,255,255,0.45)",letterSpacing:"0.08em",marginBottom:"8px"},
      input:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"12px 14px",color:"white",fontSize:"15px",outline:"none",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"},
      catBtn:{padding:"8px 14px",borderRadius:"10px",border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.7)",fontSize:"13px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      modalBtns:{display:"flex",gap:"12px",marginTop:"24px"},
      btnPri:{flex:1,padding:"14px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",color:"white",fontSize:"15px",fontWeight:"600",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      btnSec:{flex:1,padding:"14px",borderRadius:"14px",border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.6)",fontSize:"15px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      fabRow:{position:"fixed",bottom:0,left:0,right:0,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"12px 16px 28px",background:"rgba(15,15,26,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.08)",zIndex:50},
      fab:{padding:"10px 20px",borderRadius:"50px",border:"none",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",color:"white",fontSize:"14px",fontWeight:"600",cursor:"pointer",boxShadow:"0 4px 16px rgba(108,92,231,0.4)",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:"6px"},
      fabSec:{padding:"10px",borderRadius:"14px",border:"none",background:"transparent",color:"rgba(255,255,255,0.5)",fontSize:"14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"},
      logoutBtn:{padding:"6px 14px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:"12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"},
      loginRoot:{minHeight:"100vh",background:"#0f0f1a",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"},
      loginCard:{width:"100%",maxWidth:"400px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"36px 28px"},
      loginTitle:{fontSize:"36px",fontFamily:"'DM Sans',sans-serif",color:"white",margin:"0 0 32px",fontWeight:"400"},
      backBtn:{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:"13px",cursor:"pointer",padding:"0",marginBottom:"20px",fontFamily:"'DM Sans',sans-serif"},
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
